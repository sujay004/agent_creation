name: Deploy Frontend to Firebase

on:
  push:
    branches:
      - main
    paths:
      - 'english-coach-ui/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: english-coach-ui/package-lock.json

      - name: Install dependencies
        working-directory: english-coach-ui
        run: npm ci

      - name: Build
        working-directory: english-coach-ui
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: english-coach-ui-2026
          entryPoint: english-coach-ui
